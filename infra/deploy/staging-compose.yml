services:
  api:
    image: ${PROCUREDESK_API_IMAGE}
    restart: unless-stopped
    env_file:
      - ../../config/env/.env.staging.example
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/ready"]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    image: ${PROCUREDESK_WORKER_IMAGE}
    restart: unless-stopped
    env_file:
      - ../../config/env/.env.staging.example
    depends_on:
      - redis
    volumes:
      - private-files:/var/lib/procuredesk/private

  web:
    image: ${PROCUREDESK_WEB_IMAGE}
    restart: unless-stopped
    ports:
      - "8080:80"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  redis-data:
  private-files:
