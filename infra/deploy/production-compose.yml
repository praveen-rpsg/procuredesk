services:
  api:
    image: ${PROCUREDESK_API_IMAGE}
    restart: unless-stopped
    # env_file must point to the REAL secrets file managed by your ops team.
    # NEVER use .env.production.example here — that file contains placeholder values only.
    # Place the actual secrets file at /etc/procuredesk/.env.production on the host.
    env_file:
      - /etc/procuredesk/.env.production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/ready"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  worker:
    image: ${PROCUREDESK_WORKER_IMAGE}
    restart: unless-stopped
    env_file:
      - /etc/procuredesk/.env.production
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  web:
    image: ${PROCUREDESK_WEB_IMAGE}
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/procuredesk.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
