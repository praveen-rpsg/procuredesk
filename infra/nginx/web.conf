server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ──────────────────────────────────────────────────────────
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # ── SPA routing ───────────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
    # Never cache the SPA entry point — must always serve the latest index.html
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
  }

  # ── Hashed static assets — cache aggressively ─────────────────────────────────
  # Vite content-hashes filenames (e.g. index-YgqHGNwh.js) so they are
  # safe to cache for 1 year.
  location ~* \.(js|css|woff2|woff|png|jpg|svg|ico|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ── Health endpoint ───────────────────────────────────────────────────────────
  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
