upstream procuredesk_api {
  server api:3000;
}

upstream procuredesk_web {
  server web:80;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
  listen 80;
  server_name _;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name _;

  ssl_certificate /etc/letsencrypt/live/procuredesk/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/procuredesk/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # ── Security headers ──────────────────────────────────────────────────────────
  # HSTS: tell browsers to always use HTTPS for 1 year, including subdomains
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # ── API proxy ─────────────────────────────────────────────────────────────────
  location /api/ {
    proxy_pass http://procuredesk_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
    client_max_body_size 30M;   # allow import file uploads
  }

  # Health / readiness endpoints — restrict to private network only
  location = /health {
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 127.0.0.1;
    deny all;
    proxy_pass http://procuredesk_api/api/v1/health;
  }

  location = /ready {
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 127.0.0.1;
    deny all;
    proxy_pass http://procuredesk_api/api/v1/ready;
  }

  # ── Frontend SPA ──────────────────────────────────────────────────────────────
  location / {
    proxy_pass http://procuredesk_web;
    proxy_set_header Host $host;
  }
}
