name: procuredesk-platform-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: procuredesk-platform-postgres
    environment:
      POSTGRES_DB: procuredesk
      POSTGRES_USER: procuredesk
      POSTGRES_PASSWORD: procuredesk
    ports:
      - "55433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procuredesk -d procuredesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: procuredesk-platform-redis
    ports:
      - "56379:6379"
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    name: procuredesk-platform-postgres-data
  redis-data:
    name: procuredesk-platform-redis-data
