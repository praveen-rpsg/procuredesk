apiVersion: 1

groups:
  - name: procuredesk-api
    folder: ProcureDesk
    interval: 1m
    rules:
      - uid: api-error-rate
        title: "API 5xx Error Rate > 5%"
        condition: C
        for: 2m
        annotations:
          summary: "High 5xx error rate on procuredesk-api"
          description: "More than 5% of requests are returning 5xx errors over the last 2 minutes."
          runbook_url: "https://docs.procuredesk.internal/runbooks/high-error-rate"
        labels:
          severity: critical
          team: platform
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(http_requests_total{status_code=~"5.."}[5m]))
                /
                sum(rate(http_requests_total[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [0.05], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }

      - uid: api-p99-latency
        title: "API P99 Latency > 2s"
        condition: C
        for: 5m
        annotations:
          summary: "API P99 latency is above 2 seconds"
          description: "The 99th percentile request latency has exceeded 2s for 5 minutes."
        labels:
          severity: warning
          team: platform
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(0.99,
                  sum by (le) (rate(http_request_duration_seconds_bucket[5m]))
                )
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [2], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }

      - uid: outbox-dlq-events
        title: "Outbox Dead-Letter Queue Events"
        condition: C
        for: 0m
        annotations:
          summary: "Events are entering the dead-letter queue"
          description: "One or more outbox events have exhausted retry attempts. Manual investigation required."
          runbook_url: "https://docs.procuredesk.internal/runbooks/outbox-dlq"
        labels:
          severity: critical
          team: platform
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: increase(outbox_events_dead_letter_total[5m])
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }

      - uid: db-query-slow
        title: "DB Query P99 > 500ms"
        condition: C
        for: 5m
        annotations:
          summary: "Slow database queries detected"
          description: "P99 database query duration exceeded 500ms for 5 minutes."
        labels:
          severity: warning
          team: platform
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(0.99,
                  sum by (le, operation) (rate(db_query_duration_seconds_bucket[5m]))
                )
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [0.5], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }

      - uid: process-memory-high
        title: "API Process Memory > 512MB"
        condition: C
        for: 5m
        annotations:
          summary: "API process is using excessive memory"
          description: "API process heap memory has exceeded 512MB for 5 minutes — possible memory leak."
        labels:
          severity: warning
          team: platform
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: process_heap_bytes{job="procuredesk-api"}
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              conditions:
                - evaluator: { params: [536870912], type: gt }
                  operator: { type: and }
                  query: { params: [A] }
                  reducer: { params: [], type: last }
