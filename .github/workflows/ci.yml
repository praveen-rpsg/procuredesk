name: ProcureDesk CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  # ── 1. Secret scanning — fail fast before any build ──────────────────────────
  secrets-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history scan
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Dependency vulnerability audit ────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

  # ── 3. Type-check, lint, test ─────────────────────────────────────────────────
  quality:
    name: Type-check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi
      - name: Type-check
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm -r lint
      - name: Run tests
        run: pnpm --filter @procuredesk/api --filter @procuredesk/worker test

  # ── 4. Build Docker images & scan for CVEs ───────────────────────────────────
  build:
    name: Build & Scan Docker Images
    runs-on: ubuntu-latest
    needs: [secrets-scan, dependency-audit, quality]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: |
          docker build -f infra/docker/api.Dockerfile \
            -t ghcr.io/${{ github.repository }}/procuredesk-api:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/procuredesk-api:latest .

      - name: Build Web image
        run: |
          docker build -f infra/docker/web.Dockerfile \
            -t ghcr.io/${{ github.repository }}/procuredesk-web:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/procuredesk-web:latest .

      - name: Build Worker image
        run: |
          docker build -f infra/docker/worker.Dockerfile \
            -t ghcr.io/${{ github.repository }}/procuredesk-worker:${{ github.sha }} \
            -t ghcr.io/${{ github.repository }}/procuredesk-worker:latest .

      - name: Scan API image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/procuredesk-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan Worker image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/procuredesk-worker:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push images (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ github.repository }}/procuredesk-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/procuredesk-api:latest
          docker push ghcr.io/${{ github.repository }}/procuredesk-web:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/procuredesk-web:latest
          docker push ghcr.io/${{ github.repository }}/procuredesk-worker:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/procuredesk-worker:latest
